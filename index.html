<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pepo secchia</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    background: url('city.jpg') center center / cover no-repeat;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

.grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0.10;
    background-image:
        repeating-radial-gradient(
            circle at center,
            rgba(255,255,255,0.25) 0px,
            rgba(255,255,255,0.25) 1px,
            transparent 1px,
            transparent 3px
        );
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
}

h1 {
    margin: 0 0 32px 0;
    font-size: 64px;
    font-weight: 300;
    letter-spacing: 3px;
    color: #b5b5b5;
    opacity: 0;

    animation:
        fadeIn 2s ease forwards,
        floatText 6s ease-in-out infinite;

    text-shadow:
        0 0 2px rgba(255,255,255,0.10),
        0 0 18px rgba(255,255,255,0.06);
}

.links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;

    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 1s;
}

.links a {
    color: #b3bec9;
    text-decoration: underline;
    text-underline-offset: 4px;
    border: 1px solid rgba(179,190,201,0.70);
    border-radius: 4px;
    padding: 12px 24px;
    transition: all 0.2s ease;
}

.links a:hover {
    color: #ffffff;
    border-color: #ffffff;
    transform: translateY(-2px);
}

.footer {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 2;
}

.footer a {
    color: #b0b0b0;
    opacity: 0.8;
    letter-spacing: 8px;
    text-decoration: none;
}

.footer a:hover {
    opacity: 1;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes floatText {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
    100% { transform: translateY(0px); }
}
</style>

</head>

<body>

<div class="grain"></div>

<div class="container">

<h1>pepo secchia</h1>

<div class="links">

<a href="https://open.spotify.com/artist/5Co9emLnmFyRHIT4xBQ8Lg" target="_blank">spotify</a>

<a href="https://music.apple.com/us/artist/pepo-secchia/1420857837" target="_blank">apple music</a>

<a href="https://www.youtube.com/@peposecchia" target="_blank">youtube</a>

<a href="https://www.instagram.com/peposecchia" target="_blank">instagram</a>

</div>

</div>

<div class="footer">
<a href="https://www.youtube.com/watch?v=mScpHTIi-kM" target="_blank">369</a>
</div>

</body>
</html>
